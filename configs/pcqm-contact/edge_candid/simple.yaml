fixed:
  dataset: pcqm-contact
  log_path: './logs'

  use_wandb: False
  wandb_name: "best_edge_candid"

  sample_configs:
    sample_policy: edge_candid
    separate: False
    directed: False
    in_place: True
    sample_k: 80   # edge addition
    sample_k2: 20   # edge deletion
    candid_pool: 100
    ensemble: 1
    heuristic: longest_path
    include_original_graph: True

  imle_configs:
    sampler: imle
    noise_scale: 0.3
    beta: 10.
    logits_activation: null
    weight_edges: null
    marginals_mask: True
    num_train_ensemble: 1
    num_val_ensemble: 1

    model: "edge_selector"
    rwse:
      kernel: 20
      layers: 2
      dim_pe: 32
      raw_norm_type: 'BatchNorm'

    emb_hid_size: 128
    emb_optim: "adamw"
    emb_scheduler: None
    gnn_layer: 4
    mlp_layer: 2
    dropout: 0.
    embd_lr: 1.e-3
    reg_embd: 0.
    batchnorm: True

  rwse:
    kernel: 20
    layers: 2
    dim_pe: 16
    raw_norm_type: 'BatchNorm'

  # down stream model
  model: gine_duo
  hid_size: 256
  lr: 1.e-3
  optim: adam
  lr_decay:
    scheduler: plateau
    mode: min
    decay_rate: 0.5
    patience: 50
    target: val_metric
  early_stop:
    patience: 100
    target: val_metric
  reg: 0.
  num_convlayers: 5
  mlp_layers_intragraph: 3
  mlp_layers_intergraph: 2
  inter_graph_pooling: cat
  dropout: 0.
  bn: True
  residual: True
  batch_size: 256
  min_epochs: 700
  max_epochs: 1000
  data_path: './datasets'
  debug: True
  num_runs: 1